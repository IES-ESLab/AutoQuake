# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install && pre-commit install --hook-type pre-push
#
# Design principles:
# - Pre-commit: Only lightweight checks (lint/format) - won't slow down commits
# - Pre-push: Unit tests to catch regressions before pushing
# - Editing non-.py files (README, .gitignore) won't trigger any hooks

repos:
  # ========================================
  # Standard pre-commit hooks
  # ========================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # ========================================
  # Ruff: Fast Python linter and formatter
  # Replaces black, isort, flake8, and more
  # ========================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        name: Ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        types: [python]
        stages: [commit]

      - id: ruff-format
        name: Ruff format
        types: [python]
        stages: [commit]

  # ========================================
  # Pre-push hooks: Unit tests
  # Bypass with: git push --no-verify
  # ========================================
  - repo: local
    hooks:
      - id: pytest-unit
        name: Run unit tests before push
        entry: pytest tests/unit -q --tb=line -x
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
